<svg width="280" height="64" viewBox="0 0 280 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2d3e"/>
      <stop offset="100%" stop-color="#0d0f1a"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#4da6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4da6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="outerGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="278" height="62" rx="31" fill="none" stroke="#4da6ff" stroke-width="1" opacity="0.5" filter="url(#outerGlow)"/>
  <rect x="3" y="3" width="274" height="58" rx="29" fill="url(#bodyGrad)"/>
  <rect x="3" y="3" width="274" height="58" rx="29" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="4" y="4" width="272" height="26" rx="28" fill="url(#shineGrad)"/>
  <ellipse cx="140" cy="61" rx="110" ry="10" fill="url(#glowGrad)"/>

  <!-- Sparkles on left -->
  <g filter="url(#textGlow)" fill="white" opacity="0.9">
    <polygon points="48,24 49.5,28 53,29.5 49.5,31 48,35 46.5,31 43,29.5 46.5,28"/>
    <polygon points="58,18 59,21 62,22 59,23 58,26 57,23 54,22 57,21" transform="scale(0.7) translate(28,10)"/>
    <polygon points="40,34 41,36 43,37 41,38 40,40 39,38 37,37 39,36" transform="scale(0.6) translate(18,20)"/>
  </g>

  <!-- Text perfectly centered -->
  <text x="140" y="32" font-family="'Segoe UI', Arial, sans-serif"
        font-size="17" font-weight="500" fill="white"
        text-anchor="middle" dominant-baseline="middle"
        letter-spacing="0.3" filter="url(#textGlow)" opacity="0.95">Click Link</text>
</svg>
